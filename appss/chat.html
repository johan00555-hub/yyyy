<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المحادثة - مجموعة</title>
    <link rel="stylesheet" href="cssstyle.css">
    <!-- مكتبة Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="chat-container">
        <!-- رأس المحادثة -->
        <div class="chat-header">
            <div class="user-info">
                <span id="currentUser"></span>
                <button onclick="logout()" class="logout-btn">خروج</button>
            </div>
        </div>
        
        <!-- منطقة الرسائل -->
        <div id="messages" class="messages-area">
            <!-- الرسائل ستظهر هنا -->
        </div>
        
        <!-- منطقة الإدخال -->
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="اكتب رسالتك..." maxlength="500">
            <button onclick="sendMessage()">إرسال</button>
        </div>
    </div>

    <!-- ملف الجافاسكربت الخاص بك -->
    <script src="jschat.js"></script>
</body>
</html>
